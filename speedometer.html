<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Quality - Speedometer</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/raphael/2.3.0/raphael.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/justgage/1.6.1/justgage.min.js"></script>
</head>
<body>
    <div class="topbar">
        <div class="topbar-brand"><i class="fa-solid fa-leaf"></i> AIR QUALITY</div>
        <div class="topbar-menu">
            <a href="index.html">Dashboard</a>
            <a href="speedometer.html" class="active">Speedometer</a>
            <a href="grafik.html">Grafik</a>
            <a href="history.html">History</a>
        </div>
    </div>

    <div class="page-wrap">
        <div class="page-header" style="text-align: center;">
            <h1><i class="fa-solid fa-gauge-high"></i> Indikator Speedometer</h1>
            <p>Visualisasi meteran dengan standar indeks warna ISPU.</p>
        </div>

        <div class="section-title" style="color: var(--accent-yellow); margin-top: 20px;"><i class="fa-solid fa-house"></i> Area Indoor</div>
        <div class="card-grid">
            <div class="glass-card" style="text-align: center; padding-bottom: 20px;">
                <div id="g-mq135-in" style="width:100%; height:140px;"></div>
                <div id="stat-g-mq135-in" style="margin-top: -10px; min-height: 40px;">MENUNGGU</div>
            </div>
            <div class="glass-card" style="text-align: center; padding-bottom: 20px;">
                <div id="g-mq7-in" style="width:100%; height:140px;"></div>
                <div id="stat-g-mq7-in" style="margin-top: -10px; min-height: 40px;">MENUNGGU</div>
            </div>
            <div class="glass-card" style="text-align: center; padding-bottom: 20px;">

                <div id="stat-g-pm25-in" style="margin-top: -10px; min-height: 40px;">MENUNGGU</div>
            </div>
            <div class="glass-card" style="text-align: center; padding-bottom: 20px;">
                <div id="g-pm10-in" style="width:100%; height:140px;"></div>
                <div id="stat-g-pm10-in" style="margin-top: -10px; min-height: 40px;">MENUNGGU</div>
            </div>
        </div>

        <div class="section-title" style="color: var(--accent-yellow); margin-top: 30px;"><i class="fa-solid fa-tree"></i> Area Outdoor</div>
        <div class="card-grid">
            <div class="glass-card" style="text-align: center; padding-bottom: 20px;">
                <div id="g-mq135-out" style="width:100%; height:140px;"></div>
                <div id="stat-g-mq135-out" style="margin-top: -10px; min-height: 40px;">MENUNGGU</div>
            </div>
